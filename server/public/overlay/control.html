<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overlay Control</title>
  <link rel="stylesheet" href="/overlay/control.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Overlay Control</h1>
      <p id="clientLabel"></p>
    </header>

    <section class="panel">
      <h2>기프트 표시</h2>
      <label><input id="showGiftName" type="checkbox"> 기프트 이름 표시</label>
      <label><input id="showGiftImage" type="checkbox"> 기프트 이미지 표시</label>
      <label><input id="showProfileImage" type="checkbox"> 후원자 프로필 사진 표시</label>
      <label><input id="showDiamondValue" type="checkbox"> 다이아 환산값 표시</label>
      <div class="grid">
        <label>선물 정렬 기준<select id="sortMode"><option value="latest">최신순</option><option value="amount">금액순</option></select></label>
        <label>최소 표시 금액<input id="minCoins" type="number" min="0" step="1"></label>
        <label>최대 카드 수<input id="maxCards" type="number" min="1" max="30" step="1"></label>
        <label>표시 시간(ms)<input id="giftDuration" type="number" min="1000" step="500"></label>
      </div>
    </section>

    <section class="panel">
      <h2>후원 카드 컬러</h2>
      <label><input id="giftUseGradient" type="checkbox"> 그라데이션 사용</label>
      <div class="grid colors">
        <label>텍스트<input id="giftText" type="color"></label>
        <label>보더<input id="giftBorder" type="color"></label>
        <label>배경<input id="giftBg" type="color"></label>
        <label>그라데이션 시작<input id="giftGradFrom" type="color"></label>
        <label>그라데이션 끝<input id="giftGradTo" type="color"></label>
      </div>
    </section>

    <section class="panel">
      <h2>레벨업 카드</h2>
      <label><input id="levelEnabled" type="checkbox"> 레벨업 카드 표시</label>
      <div class="grid">
        <label>최대 카드 수<input id="levelMaxCards" type="number" min="1" max="10"></label>
        <label>표시 시간(ms)<input id="levelDuration" type="number" min="1000" step="500"></label>
      </div>
      <h3>레벨업 카드 컬러</h3>
      <label><input id="levelUseGradient" type="checkbox"> 그라데이션 사용</label>
      <div class="grid colors">
        <label>텍스트<input id="levelText" type="color"></label>
        <label>보더<input id="levelBorder" type="color"></label>
        <label>배경<input id="levelBg" type="color"></label>
        <label>그라데이션 시작<input id="levelGradFrom" type="color"></label>
        <label>그라데이션 끝<input id="levelGradTo" type="color"></label>
      </div>
    </section>

    <section class="actions">
      <button id="saveBtn">설정 저장</button>
      <button id="testGiftBtn" type="button">테스트 기프트</button>
      <button id="testLevelBtn" type="button">테스트 레벨업</button>
      <button id="resetBtn" type="button">화면 초기화</button>
      <a id="overlayLink" target="_blank">오버레이 열기</a>
    </section>
    <pre id="status"></pre>
  </main>
  <script src="/overlay/control.js"></script>
</body>
</html>

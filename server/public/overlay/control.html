<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Overlay Control</title>
  <link rel="stylesheet" href="/overlay/control.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <div>
        <p class="eyebrow">TikFinity Gift Overlay</p>
        <h1>오버레이 컨트롤 패널</h1>
        <p id="clientLabel" class="client-label"></p>
      </div>
      <a id="overlayLink" class="open-link" target="_blank">오버레이 열기</a>
    </header>

    <section class="panel">
      <div class="panel-head">
        <span class="icon">🎁</span>
        <div><h2>기프트 표시</h2><p>최근 선물 리스트에 표시할 정보와 정렬 방식을 설정합니다.</p></div>
      </div>
      <div class="toggle-grid">
        <label class="toggle"><input id="showGiftName" type="checkbox"><span>기프트 이름 표시</span></label>
        <label class="toggle"><input id="showGiftImage" type="checkbox"><span>기프트 이미지 표시</span></label>
        <label class="toggle"><input id="showProfileImage" type="checkbox"><span>후원자 프로필 사진 표시</span></label>
        <label class="toggle"><input id="showDiamondValue" type="checkbox"><span>다이아 환산값 표시</span></label>
      </div>
      <div class="grid three">
        <label class="field">선물 정렬 기준<select id="sortMode"><option value="latest">최신순</option><option value="amount">금액순</option></select></label>
        <label class="field">최소 표시 금액<input id="minCoins" type="number" min="0" step="1"></label>
        <label class="field">최대 카드 수<input id="maxCards" type="number" min="1" max="30" step="1"></label>
        <label class="field">기프트 폰트 크기<input id="giftFontSize" type="number" min="14" max="72" step="1"></label>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span class="icon">🌈</span>
        <div><h2>후원 카드 컬러</h2><p>텍스트, 배경, 보더, 그라데이션을 컬러 피커로 설정합니다.</p></div>
      </div>
      <label class="toggle wide"><input id="giftUseGradient" type="checkbox"><span>그라데이션 사용</span></label>
      <div class="grid colors">
        <label class="color-field">텍스트<input id="giftText" type="color"></label>
        <label class="color-field">보더<input id="giftBorder" type="color"></label>
        <label class="color-field">배경<input id="giftBg" type="color"></label>
        <label class="color-field">그라데이션 시작<input id="giftGradFrom" type="color"></label>
        <label class="color-field">그라데이션 끝<input id="giftGradTo" type="color"></label>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span class="icon">⭐</span>
        <div><h2>레벨업 카드</h2><p>멤버 레벨이 상승했을 때 표시되는 카드 설정입니다.</p></div>
      </div>
      <div class="toggle-grid compact">
        <label class="toggle"><input id="levelEnabled" type="checkbox"><span>레벨업 카드 표시</span></label>
      </div>
      <div class="grid three">
        <label class="field">최대 카드 수<input id="levelMaxCards" type="number" min="1" max="10"></label>
        <label class="field">레벨업 폰트 크기<input id="levelFontSize" type="number" min="14" max="72" step="1"></label>
      </div>
      <h3>레벨업 카드 컬러</h3>
      <label class="toggle wide"><input id="levelUseGradient" type="checkbox"><span>그라데이션 사용</span></label>
      <div class="grid colors">
        <label class="color-field">텍스트<input id="levelText" type="color"></label>
        <label class="color-field">보더<input id="levelBorder" type="color"></label>
        <label class="color-field">배경<input id="levelBg" type="color"></label>
        <label class="color-field">그라데이션 시작<input id="levelGradFrom" type="color"></label>
        <label class="color-field">그라데이션 끝<input id="levelGradTo" type="color"></label>
      </div>
    </section>

    <section class="actions">
      <button id="saveBtn" class="primary">설정 저장</button>
      <button id="testGiftBtn" type="button">테스트 기프트</button>
      <button id="testLevelBtn" type="button">테스트 레벨업</button>
      <button id="resetBtn" type="button" class="ghost">화면 초기화</button>
    </section>
    <pre id="status"></pre>
  </main>
  <script src="/overlay/control.js"></script>
</body>
</html>
